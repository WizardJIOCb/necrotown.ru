<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NecroTown</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #070707;
      --bg-2: #1b0f12;
      --panel: rgba(18, 14, 15, 0.9);
      --panel-2: rgba(32, 24, 25, 0.82);
      --border: rgba(245, 239, 232, 0.14);
      --accent: #d24b43;
      --gold: #e8b15f;
      --text: #f5efe8;
      --muted: #b9aaa1;
      --green: #75b66c;
      --blue: #7da8d9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(232, 177, 95, 0.11), transparent 26%),
        radial-gradient(circle at top, rgba(210, 75, 67, 0.22), transparent 35%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .intro {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      transition: opacity 620ms ease, transform 780ms cubic-bezier(.2, .8, .2, 1), filter 620ms ease;
    }

    .intro.is-hidden {
      opacity: 0;
      transform: translateY(-42px) scale(0.94);
      filter: blur(12px);
      pointer-events: none;
    }

    .brand {
      margin: 0;
      padding: 24px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(56px, 12vw, 144px);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(210, 75, 67, 0.35);
      transition: color 220ms ease, transform 220ms ease, text-shadow 220ms ease;
    }

    .brand:hover,
    .brand:focus-visible {
      color: #fff8ef;
      outline: 0;
      transform: translateY(-4px);
      text-shadow: 0 0 34px rgba(210, 75, 67, 0.55), 0 0 70px rgba(232, 177, 95, 0.18);
    }

    .auth-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(22px) scale(0.98);
      transition: opacity 520ms ease 220ms, visibility 0s linear 760ms, transform 620ms cubic-bezier(.2, .8, .2, 1) 220ms;
    }

    .auth-shell.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition-delay: 180ms, 0s, 180ms;
    }

    .auth-panel,
    .hero-card,
    .work-panel,
    .chat-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), transparent 42%), var(--panel);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
    }

    .auth-panel {
      width: min(100%, 430px);
      padding: 24px;
    }

    .auth-title {
      margin: 0 0 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
      padding: 4px;
      border: 1px solid rgba(245, 239, 232, 0.11);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .tab,
    .menu-button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .tab.is-active,
    .menu-button.is-active {
      background: rgba(210, 75, 67, 0.24);
      color: var(--text);
    }

    .auth-form {
      display: none;
      gap: 12px;
    }

    .auth-form.is-active {
      display: grid;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(245, 239, 232, 0.15);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    input:focus,
    select:focus {
      border-color: rgba(232, 177, 95, 0.74);
      box-shadow: 0 0 0 3px rgba(232, 177, 95, 0.12);
    }

    .submit,
    .chat-send,
    .logout {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), #9d2d35);
      color: #fffaf4;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 12px 28px rgba(210, 75, 67, 0.25);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .submit {
      margin-top: 4px;
    }

    .submit:hover,
    .submit:focus-visible,
    .chat-send:hover,
    .chat-send:focus-visible,
    .logout:hover,
    .logout:focus-visible {
      outline: 0;
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .message {
      min-height: 20px;
      color: var(--gold);
      font-size: 13px;
      line-height: 1.35;
    }

    .game-shell {
      display: none;
      min-height: 100vh;
      padding: 18px;
    }

    body.is-game .intro,
    body.is-game .auth-shell {
      display: none;
    }

    body.is-game .game-shell {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .top-menu,
    .resource-line {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(12, 10, 10, 0.74);
      padding: 8px;
    }

    .top-menu {
      grid-template-columns: repeat(7, minmax(104px, 1fr)) auto;
      align-items: center;
    }

    .logout {
      min-width: 104px;
      background: rgba(245, 239, 232, 0.11);
      box-shadow: none;
    }

    .resource-line {
      grid-template-columns: repeat(5, minmax(120px, 1fr));
    }

    .resource {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 7px 10px;
      border: 1px solid rgba(245, 239, 232, 0.09);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.035);
    }

    .resource-icon {
      position: relative;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    .icon-bones::before,
    .icon-bones::after {
      content: "";
      position: absolute;
      background: #d9d0bf;
    }

    .icon-bones::before {
      width: 19px;
      height: 6px;
      left: 5px;
      top: 12px;
      border-radius: 10px;
      transform: rotate(-28deg);
    }

    .icon-bones::after {
      width: 7px;
      height: 7px;
      left: 4px;
      top: 9px;
      border-radius: 50%;
      box-shadow: 15px 7px 0 #d9d0bf;
    }

    .icon-souls {
      border-radius: 50%;
      background: radial-gradient(circle at 42% 38%, #dff7ff 0 18%, #7da8d9 19% 42%, rgba(125, 168, 217, 0.18) 43% 100%);
      box-shadow: 0 0 18px rgba(125, 168, 217, 0.38);
    }

    .icon-iron {
      clip-path: polygon(50% 2%, 92% 25%, 82% 82%, 50% 98%, 18% 82%, 8% 25%);
      background: linear-gradient(135deg, #c9d0d5, #6b737d 55%, #363d44);
    }

    .icon-ether {
      border-radius: 5px;
      transform: rotate(45deg) scale(0.82);
      background: linear-gradient(135deg, #efd48d, #8bd4c1 58%, #466c82);
      box-shadow: 0 0 18px rgba(139, 212, 193, 0.32);
    }

    .icon-plague {
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #d5f27d 0 18%, transparent 19%),
        radial-gradient(circle at 50% 6px, #8fbf45 0 4px, transparent 5px),
        radial-gradient(circle at 24px 21px, #8fbf45 0 4px, transparent 5px),
        radial-gradient(circle at 6px 21px, #8fbf45 0 4px, transparent 5px),
        #334020;
    }

    .resource-name {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .resource-value {
      display: block;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
    }

    .play-layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .hero-card {
      align-self: stretch;
      padding: 14px;
    }

    .avatar {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid rgba(245, 239, 232, 0.13);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 34%, rgba(245, 239, 232, 0.2) 0 13%, transparent 14%),
        radial-gradient(circle at 39% 31%, #f1d08d 0 3%, transparent 4%),
        radial-gradient(circle at 61% 31%, #f1d08d 0 3%, transparent 4%),
        linear-gradient(145deg, rgba(210, 75, 67, 0.32), rgba(125, 168, 217, 0.18)),
        #151112;
      box-shadow: inset 0 0 38px rgba(0, 0, 0, 0.46);
    }

    .hero-name {
      margin: 12px 0 3px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 23px;
      line-height: 1.1;
    }

    .hero-class {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stat-list {
      display: grid;
      gap: 8px;
      margin: 0;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(245, 239, 232, 0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .stat-row strong {
      color: var(--text);
    }

    .work-panel {
      min-width: 0;
      min-height: 470px;
      padding: 14px;
    }

    .work-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .work-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
    }

    .work-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .city-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 12px;
      min-height: 390px;
    }

    .buildings {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
    }

    .building {
      min-height: 128px;
      padding: 12px;
      border: 1px solid rgba(245, 239, 232, 0.12);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(232, 177, 95, 0.08), transparent 45%),
        rgba(255, 255, 255, 0.045);
      color: var(--text);
      text-align: left;
      transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .building:hover,
    .building:focus-visible,
    .building.is-selected {
      outline: 0;
      border-color: rgba(232, 177, 95, 0.62);
      background:
        linear-gradient(145deg, rgba(232, 177, 95, 0.14), transparent 45%),
        rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    .building-icon {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 23px;
      font-weight: 900;
    }

    .building-name {
      display: block;
      font-weight: 900;
      line-height: 1.15;
    }

    .building-status {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .building-panel {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .building-panel h3 {
      margin: 0;
      font-size: 24px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.1;
    }

    .building-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .building-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .map-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 12px;
      min-height: 390px;
    }

    .map-viewport {
      overflow: auto;
      min-height: 390px;
      padding: 22px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background:
        radial-gradient(circle at 52% 44%, rgba(125, 168, 217, 0.13), transparent 34%),
        linear-gradient(145deg, rgba(232, 177, 95, 0.07), transparent 52%),
        rgba(0, 0, 0, 0.22);
    }

    .hex-map {
      display: grid;
      gap: 0;
      min-width: 760px;
    }

    .hex-row {
      display: flex;
      gap: 8px;
      min-height: 76px;
    }

    .hex-row + .hex-row {
      margin-top: -14px;
    }

    .hex-row.is-offset {
      padding-left: 41px;
    }

    .map-hex {
      position: relative;
      display: grid;
      place-items: center;
      width: 74px;
      height: 84px;
      border: 0;
      clip-path: polygon(50% 0, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      background: var(--biome);
      color: rgba(255, 250, 244, 0.92);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.12), inset 0 -26px 28px rgba(0, 0, 0, 0.22);
      transition: filter 180ms ease, transform 180ms ease;
    }

    .map-hex::after {
      content: "";
      position: absolute;
      inset: 7px;
      clip-path: inherit;
      background:
        radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.18), transparent 18%),
        linear-gradient(135deg, transparent, rgba(0, 0, 0, 0.18));
      opacity: 0.72;
      pointer-events: none;
    }

    .map-hex:hover,
    .map-hex:focus-visible,
    .map-hex.is-selected {
      z-index: 2;
      outline: 0;
      filter: brightness(1.18) saturate(1.12);
      transform: translateY(-3px) scale(1.04);
    }

    .hex-code {
      position: relative;
      z-index: 1;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
    }

    .map-panel {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .map-panel h3 {
      margin: 0;
      font-size: 24px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.1;
    }

    .map-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .houses-layout {
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr);
      gap: 12px;
      min-height: 390px;
    }

    .house-list {
      display: grid;
      align-content: start;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
    }

    .house-button {
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .house-button:hover,
    .house-button:focus-visible,
    .house-button.is-selected {
      outline: 0;
      border-color: color-mix(in srgb, var(--house-color), #fff 24%);
      background: linear-gradient(135deg, color-mix(in srgb, var(--house-color), transparent 78%), rgba(255, 255, 255, 0.045));
      transform: translateY(-1px);
    }

    .house-emblem {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: linear-gradient(145deg, color-mix(in srgb, var(--house-color), #000 34%), rgba(255, 255, 255, 0.06));
      color: #fffaf4;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 900;
      box-shadow: 0 0 18px color-mix(in srgb, var(--house-color), transparent 62%);
    }

    .house-button-title,
    .house-section-title,
    .junior-name,
    .upgrade-name {
      font-weight: 900;
    }

    .house-button-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .house-details {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .house-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--house-color), transparent 83%), transparent 52%),
        rgba(0, 0, 0, 0.2);
    }

    .house-kicker {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .house-name {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      line-height: 1;
    }

    .house-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .house-progress {
      display: grid;
      gap: 8px;
      align-content: center;
    }

    .progress-track {
      overflow: hidden;
      height: 12px;
      border: 1px solid rgba(245, 239, 232, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.32);
    }

    .progress-fill {
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--house-color), var(--gold));
    }

    .house-content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 12px;
    }

    .house-stack,
    .patriarch-card,
    .house-side-panel,
    .junior-card,
    .upgrade-card {
      border: 1px solid rgba(245, 239, 232, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .house-stack,
    .house-side-panel {
      display: grid;
      gap: 12px;
      align-content: start;
      padding: 12px;
    }

    .patriarch-card {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .patriarch-portrait,
    .junior-portrait {
      border: 1px solid rgba(245, 239, 232, 0.12);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 250, 244, 0.28) 0 13%, transparent 14%),
        radial-gradient(circle at 39% 31%, var(--gold) 0 3%, transparent 4%),
        radial-gradient(circle at 61% 31%, var(--gold) 0 3%, transparent 4%),
        linear-gradient(145deg, color-mix(in srgb, var(--house-color), transparent 34%), rgba(125, 168, 217, 0.13)),
        #161112;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.48);
    }

    .patriarch-portrait {
      width: 86px;
      height: 100px;
    }

    .patriarch-card h3,
    .house-section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 23px;
      line-height: 1.1;
    }

    .pill-row,
    .bonus-list,
    .poi-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      padding: 5px 9px;
      border: 1px solid rgba(245, 239, 232, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
    }

    .bonus-chip {
      border-color: color-mix(in srgb, var(--house-color), transparent 58%);
      color: #fffaf4;
    }

    .junior-grid,
    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .junior-card,
    .upgrade-card {
      display: grid;
      gap: 10px;
      padding: 10px;
    }

    .junior-head {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 10px;
      align-items: center;
    }

    .junior-portrait {
      width: 48px;
      height: 48px;
    }

    .junior-meta,
    .upgrade-meta,
    .house-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .health-track {
      overflow: hidden;
      height: 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
    }

    .health-fill {
      width: var(--health);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .upgrade-card.is-maxed {
      border-color: rgba(117, 182, 108, 0.38);
    }

    .upgrade-action {
      min-height: 36px;
      border: 1px solid rgba(245, 239, 232, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
    }

    .upgrade-action:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .danger-action {
      border-color: rgba(210, 75, 67, 0.3);
      color: #ffd9d4;
    }

    .biome-chip {
      display: inline-flex;
      width: fit-content;
      min-height: 28px;
      align-items: center;
      gap: 8px;
      padding: 5px 9px;
      border: 1px solid rgba(245, 239, 232, 0.13);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .biome-chip::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--biome);
      box-shadow: 0 0 12px var(--biome);
    }

    .biome-legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .legend-swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      background: var(--biome);
      flex: 0 0 auto;
    }

    .ghost-button {
      min-height: 40px;
      border: 1px solid rgba(245, 239, 232, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-weight: 800;
    }

    .placeholder {
      display: grid;
      place-items: center;
      min-height: 360px;
      border: 1px solid rgba(245, 239, 232, 0.09);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: 190px;
      padding: 12px;
    }

    .chat-title {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .chat-log {
      display: grid;
      align-content: start;
      gap: 7px;
      min-height: 86px;
      max-height: 150px;
      overflow: auto;
      padding-right: 4px;
    }

    .chat-message {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .chat-message strong {
      color: var(--gold);
    }

    .chat-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px;
      gap: 8px;
    }

    @media (max-width: 980px) {
      body.is-game .game-shell {
        padding: 10px;
      }

      .top-menu,
      .resource-line,
      .play-layout,
      .city-grid,
      .map-layout,
      .houses-layout,
      .house-summary,
      .house-content-grid {
        grid-template-columns: 1fr;
      }

      .buildings,
      .junior-grid,
      .upgrade-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-card {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 14px;
      }

      .hero-name {
        margin-top: 0;
      }
    }

    @media (max-width: 560px) {
      .brand {
        padding: 12px;
        font-size: clamp(44px, 18vw, 76px);
        letter-spacing: 0.04em;
      }

      .auth-panel,
      .work-panel,
      .chat-panel,
      .hero-card {
        padding: 12px;
      }

      .resource-line,
      .buildings,
      .junior-grid,
      .upgrade-grid,
      .chat-form,
      .hero-card,
      .patriarch-card {
        grid-template-columns: 1fr;
      }

      .work-head {
        display: grid;
      }

      .map-viewport {
        padding: 14px;
      }
    }
  </style>
</head>

        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="registerForm" data-tab="register">Регистрация</button>
      </div>

      <form class="auth-form is-active" id="loginForm">
        <label>

          <input name="login" autocomplete="username" required />
        </label>
        <label>
          Пароль

        </label>
        <button class="submit" type="submit">Войти в игру</button>
      </form>

      <form class="auth-form" id="registerForm">
        <label>
          Логин
          <input name="username" autocomplete="username" required />
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email" required />
        </label>

        </label>

    let state = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function showAuth() {
      intro.classList.add("is-hidden");
      authShell.classList.add("is-visible");
      authShell.setAttribute("aria-hidden", "false");
      window.setTimeout(() => authForms.login.querySelector("input").focus(), 520);
    }

    function setAuthMessage(text) {
      authMessage.textContent = text || "";
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });
      const data = await response.json().catch(() => ({ ok: false, error: "Сервер вернул некорректный ответ." }));

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Запрос не выполнен.");
      }

      return data;
    }

    function formData(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function selectAuthTab(mode) {
      tabs.forEach((item) => {
        const isActive = item.dataset.tab === mode;
        item.classList.toggle("is-active", isActive);
        item.setAttribute("aria-selected", String(isActive));
      });

      Object.entries(authForms).forEach(([name, form]) => {
        form.classList.toggle("is-active", name === mode);
      });

      setAuthMessage("");
      authForms[mode].querySelector("input").focus();
    }

      workPanel.innerHTML = `
        <div class="work-head">

        <div class="city-grid">
          <div class="buildings">
            ${state.buildings.map((item) => `
              <button class="building ${item.id === selectedBuildingId ? "is-selected" : ""}" type="button" data-building-id="${item.id}">
                <span class="building-icon">${buildingLetters[item.type] || "N"}</span>
                <span class="building-name">${escapeHtml(item.name)}</span>

              </button>

          </div>
          <aside class="building-panel">

            <div class="stat-row"><span>Уровень</span><strong>${building.level}</strong></div>
            <div class="stat-row"><span>Статус</span><strong>${escapeHtml(building.status)}</strong></div>
            <div class="building-actions">
              <button class="ghost-button" type="button">Улучшить</button>
              <button class="ghost-button" type="button">Открыть</button>
            </div>
          </aside>
        </div>
      `;

      workPanel.querySelectorAll("[data-building-id]").forEach((button) => {

    function worldHexes() {
      return worldMapRows.flatMap((row, rowIndex) => row.map((biomeKey, colIndex) => ({
        id: `H-${rowIndex + 1}-${colIndex + 1}`,
        row: rowIndex,
        col: colIndex,
        biomeKey,
        biome: biomes[biomeKey]
      })));
    }

      return hexes.find((hex) => hex.id === selectedHexId) || hexes[0];
    }

    function renderMap() {
      const hex = selectedHex();
      selectedHexId = hex.id;

      workPanel.innerHTML = `
        <div class="work-head">
          <h2 class="work-title">${viewTitles[activeView]}</h2>
          <span class="work-meta">Глобальная карта: ${worldMapRows.length} рядов гексов</span>
        </div>
        <div class="map-layout">
          <div class="map-viewport" aria-label="Глобальная карта мира">
            <div class="hex-map">
              ${worldMapRows.map((row, rowIndex) => `
                <div class="hex-row ${rowIndex % 2 ? "is-offset" : ""}">
                  ${row.map((biomeKey, colIndex) => {
                    const item = {
                      id: `H-${rowIndex + 1}-${colIndex + 1}`,
                      biome: biomes[biomeKey]
                    };

                    return `

                        title="${item.id}: ${escapeHtml(item.biome.name)}"
                      >
                        <span class="hex-code">${item.id}</span>
                      </button>

                </div>
              `).join("")}
            </div>
          </div>
          <aside class="map-panel">
            <span class="biome-chip" style="--biome: ${hex.biome.color}">${escapeHtml(hex.biome.name)}</span>
            <h3>${hex.id}</h3>
            <p>${escapeHtml(hex.biome.description)}</p>
            <div class="stat-row"><span>Координаты</span><strong>${hex.col + 1}:${hex.row + 1}</strong></div>
            <div class="stat-row"><span>Опасность</span><strong>${escapeHtml(hex.biome.danger)}</strong></div>
            <div class="stat-row"><span>Основной ресурс</span><strong>${escapeHtml(hex.biome.resource)}</strong></div>
            <div class="biome-legend" aria-label="Легенда биомов">
              ${Object.values(biomes).map((biome) => `
                <span class="legend-item">
                  <span class="legend-swatch" style="--biome: ${biome.color}" aria-hidden="true"></span>
                  ${escapeHtml(biome.name)}
                </span>
              `).join("")}
            </div>
          </aside>
        </div>
      `;

      workPanel.querySelectorAll("[data-hex-id]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedHexId = button.dataset.hexId;
          renderMap();
        });
      });
    }

    function cloneCost(cost) {
      return Object.fromEntries(Object.entries(cost).map(([resource, value]) => [resource, Number(value)]));
    }

    function formatCost(cost) {
      return Object.entries(cost)
        .map(([resource, value]) => `${resourceNames[resource] || resource}: ${value}`)
        .join(" · ");
    }

    function hasResources(cost) {
      return Object.entries(cost).every(([resource, value]) => (state.resources[resource] ?? 0) >= value);
    }

    function spendResources(cost) {
      if (!hasResources(cost)) {
        return false;
      }

      Object.entries(cost).forEach(([resource, value]) => {
        state.resources[resource] = Math.max(0, (state.resources[resource] ?? 0) - value);
      });

      renderResources();
      return true;
    }

    function levelInfo(level) {
      return houseLevelTable[Math.min(level, houseLevelTable.length) - 1] || houseLevelTable[0];
    }

    function experienceProgress(house) {
      const currentLevelStart = houseExperienceCurve[house.level] ?? 0;
      const nextLevelExperience = houseExperienceCurve[house.level + 1] ?? currentLevelStart;
      if (nextLevelExperience <= currentLevelStart) {
        return 100;
      }

      return Math.max(0, Math.min(100, Math.round(((house.experience - currentLevelStart) / (nextLevelExperience - currentLevelStart)) * 100)));
    }

    function grantHouseExperience(house, amount) {
      house.experience += amount;
      while (house.level < houseLevelTable.length && house.experience >= houseExperienceCurve[house.level + 1]) {
        house.level += 1;
        house.juniorSlots = levelInfo(house.level).juniorSlots;
      }
    }

    function ensureVampireHouses() {
      if (state.vampireHouses && state.patriarchs && state.juniorVampires) {
        return;
      }

      const patriarchs = {};
      const juniorVampires = {};

      state.population = state.population || {
        total: 64,
        available: 42
      };

      state.vampireHouses = vampireHouseDefinitions.map((definition) => {
        const patriarchId = `${definition.id}-patriarch`;
        patriarchs[patriarchId] = {
          id: patriarchId,
          ...definition.patriarch,
          houseId: definition.id
        };

        const juniorIds = definition.juniors.map((junior, index) => {
          const juniorId = `${definition.id}-junior-${index + 1}`;
          juniorVampires[juniorId] = {
            id: juniorId,
            portrait: definition.emblem,
            ...junior,
            houseId: definition.id
          };
          return juniorId;
        });

        const levelData = levelInfo(definition.startingLevel);

        return {
          id: definition.id,
          name: definition.name,
          level: definition.startingLevel,
          experience: definition.startingExperience,
          patriarchId,
          juniorSlots: levelData.juniorSlots,
          juniorIds,
          upgrades: definition.upgrades.map((upgrade) => ({
            id: upgrade.id,
            name: upgrade.name,
            effect: upgrade.effect,
            level: 0,
            maxLevel: upgrade.maxLevel,
            cost: cloneCost(upgrade.cost)
          })),
          modifiers: definition.modifiers.map(([name, value]) => ({ name, value })),
          unlockedAbilities: [...definition.unlockedAbilities],
          discoveredPOI: [...definition.discoveredPOI],
          houseType: definition.houseType
        };
      });

      state.patriarchs = patriarchs;
      state.juniorVampires = juniorVampires;
    }

    function houseDefinition(houseId) {
      return vampireHouseDefinitions.find((definition) => definition.id === houseId) || vampireHouseDefinitions[0];
    }

    function selectedHouse() {
      ensureVampireHouses();
      return state.vampireHouses.find((house) => house.id === selectedHouseId) || state.vampireHouses[0];
    }

    function currentUpgradeCost(upgrade) {
      const multiplier = upgrade.level + 1;
      return Object.fromEntries(Object.entries(upgrade.cost).map(([resource, value]) => [resource, value * multiplier]));
    }

    function createJuniorCost(house) {
      return {
        souls: 10 + house.level * 4,
        plague: 1 + Math.floor(house.level / 2)
      };
    }

    function renderHouses() {
      ensureVampireHouses();

      const house = selectedHouse();
      const definition = houseDefinition(house.id);
      selectedHouseId = house.id;

      const patriarch = state.patriarchs[house.patriarchId];
      const juniors = house.juniorIds.map((juniorId) => state.juniorVampires[juniorId]).filter(Boolean);
      const progress = experienceProgress(house);
      const levelData = levelInfo(house.level);
      const convertCost = createJuniorCost(house);
      const canCreateJunior = juniors.length < house.juniorSlots && state.population.available > 0 && hasResources(convertCost);

      workPanel.innerHTML = `
        <div class="work-head">
          <h2 class="work-title">${viewTitles[activeView]}</h2>
          <span class="work-meta">Элита империи · ${state.vampireHouses.length} домов</span>
        </div>
        <div class="houses-layout" style="--house-color: ${definition.color}">
          <aside class="house-list" aria-label="Список домов вампиров">
            ${state.vampireHouses.map((item) => {
              const itemDefinition = houseDefinition(item.id);
              return `
                <button
                  class="house-button ${item.id === selectedHouseId ? "is-selected" : ""}"
                  type="button"
                  data-house-id="${item.id}"
                  style="--house-color: ${itemDefinition.color}"
                >
                  <span class="house-emblem" aria-hidden="true">${escapeHtml(itemDefinition.emblem)}</span>
                  <span>
                    <span class="house-button-title">${escapeHtml(item.name)}</span>
                    <span class="house-button-meta">Ур. ${item.level} · ${item.juniorIds.length}/${item.juniorSlots}</span>
                  </span>
                </button>
              `;
            }).join("")}
          </aside>

          <section class="house-details">
            <div class="house-summary">
              <div>
                <p class="house-kicker">${escapeHtml(house.houseType)}</p>
                <h3 class="house-name">${escapeHtml(house.name)}</h3>
                <p class="house-description">${escapeHtml(definition.role)} ${escapeHtml(definition.uniqueMechanic)}</p>
              </div>
              <div class="house-progress">
                <div class="stat-row"><span>Уровень дома</span><strong>${house.level}</strong></div>
                <div class="stat-row"><span>Множитель бонусов</span><strong>x${levelData.bonusMultiplier.toFixed(2)}</strong></div>
                <div class="progress-track" aria-label="Прогресс дома">
                  <div class="progress-fill" style="--progress: ${progress}%"></div>
                </div>
                <span class="house-note">${progress}% до следующего уровня</span>
              </div>
            </div>

            <div class="house-content-grid">
              <div class="house-stack">
                <article class="patriarch-card">
                  <div class="patriarch-portrait" aria-hidden="true"></div>
                  <div>
                    <p class="house-kicker">Патриарх</p>
                    <h3>${escapeHtml(patriarch.name)}</h3>
                    <div class="stat-row"><span>Уровень</span><strong>${patriarch.level}</strong></div>
                    <div class="stat-row"><span>Опыт</span><strong>${patriarch.experience}</strong></div>
                    <div class="pill-row">
                      ${patriarch.abilities.map((ability) => `<span class="pill">${escapeHtml(ability)}</span>`).join("")}
                    </div>
                    <p class="house-note">Снаряжение: ${patriarch.equipment.map(escapeHtml).join(" · ")}</p>
                    <p class="house-note">Мутации: ${patriarch.bloodMutations.map(escapeHtml).join(" · ")}</p>
                    <p class="house-note">One Man Army: патриарх защищает поселение и участвует в битвах без отряда.</p>
                  </div>
                </article>

                <div>
                  <h3 class="house-section-title">Младшие вампиры</h3>
                  <p class="house-note">Слоты: ${juniors.length}/${house.juniorSlots} · Население: ${state.population.available}/${state.population.total}</p>
                </div>
                <div class="junior-grid">
                  ${juniors.map((junior) => `
                    <article class="junior-card">
                      <div class="junior-head">
                        <div class="junior-portrait" aria-hidden="true"></div>
                        <div>
                          <div class="junior-name">${escapeHtml(junior.name)}</div>
                          <div class="junior-meta">Ур. ${junior.level} · ${escapeHtml(juniorTasks[junior.currentTask] || junior.currentTask)}</div>
                        </div>
                      </div>
                      <div class="health-track" aria-label="Здоровье ${escapeHtml(junior.name)}">
                        <div class="health-fill" style="--health: ${junior.healthPercent}%"></div>
                      </div>
                      <select data-junior-task="${junior.id}" aria-label="Задача младшего ${escapeHtml(junior.name)}">
                        ${Object.entries(juniorTasks).map(([task, label]) => `
                          <option value="${task}" ${junior.currentTask === task ? "selected" : ""}>${escapeHtml(label)}</option>
                        `).join("")}
                      </select>
                      <button class="upgrade-action danger-action" type="button" data-remove-junior="${junior.id}">Зафиксировать гибель</button>
                    </article>
                  `).join("")}
                  ${juniors.length < house.juniorSlots ? `
                    <article class="junior-card">
                      <div class="junior-name">Свободный слот</div>
                      <p class="junior-meta">Обращение удалит одного человека из населения и создаст смертного агента дома.</p>
                      <button class="upgrade-action" type="button" data-create-junior="${house.id}" ${canCreateJunior ? "" : "disabled"}>
                        Обратить · ${formatCost(convertCost)}
                      </button>
                    </article>
                  ` : ""}
                </div>

                <div>
                  <h3 class="house-section-title">Улучшения дома</h3>
                </div>
                <div class="upgrade-grid">
                  ${house.upgrades.map((upgrade) => {
                    const isMaxed = upgrade.level >= upgrade.maxLevel;
                    const cost = currentUpgradeCost(upgrade);
                    const canUpgrade = !isMaxed && hasResources(cost);
                    return `
                      <article class="upgrade-card ${isMaxed ? "is-maxed" : ""}">
                        <div class="upgrade-name">${escapeHtml(upgrade.name)}</div>
                        <div class="upgrade-meta">Ур. ${upgrade.level}/${upgrade.maxLevel} · ${escapeHtml(upgrade.effect)}</div>
                        <button class="upgrade-action" type="button" data-upgrade-id="${upgrade.id}" ${canUpgrade ? "" : "disabled"}>
                          ${isMaxed ? "Завершено" : `Улучшить · ${formatCost(cost)}`}
                        </button>
                      </article>
                    `;
                  }).join("")}
                </div>
              </div>

              <aside class="house-side-panel">
                <h3 class="house-section-title">Бонусы</h3>
                <div class="bonus-list">
                  ${house.modifiers.map((modifier) => `
                    <span class="pill bonus-chip">${escapeHtml(modifier.name)} ${escapeHtml(modifier.value)}</span>
                  `).join("")}
                </div>

                <h3 class="house-section-title">Коллекция способностей</h3>
                <div class="pill-row">
                  ${house.unlockedAbilities.map((ability) => `<span class="pill">${escapeHtml(ability)}</span>`).join("")}
                </div>

                <h3 class="house-section-title">Уникальные POI</h3>
                <div class="poi-list">
                  ${house.discoveredPOI.map((poi) => `<span class="pill">${escapeHtml(poi)}</span>`).join("")}
                </div>

                <h3 class="house-section-title">Открытия уровня</h3>
                <div class="pill-row">
                  ${levelData.unlocks.map((unlock) => `<span class="pill">${escapeHtml(unlock)}</span>`).join("")}
                </div>
              </aside>
            </div>
          </section>
        </div>
      `;

      workPanel.querySelectorAll("[data-house-id]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedHouseId = button.dataset.houseId;
          renderHouses();
        });
      });

      workPanel.querySelectorAll("[data-upgrade-id]").forEach((button) => {
        button.addEventListener("click", () => {
          const upgrade = house.upgrades.find((item) => item.id === button.dataset.upgradeId);
          if (!upgrade || upgrade.level >= upgrade.maxLevel) {
            return;
          }

          const cost = currentUpgradeCost(upgrade);
          if (!spendResources(cost)) {
            renderHouses();
            return;
          }

          upgrade.level += 1;
          grantHouseExperience(house, 70 + upgrade.level * 25);
          renderHouses();
        });
      });

      workPanel.querySelectorAll("[data-create-junior]").forEach((button) => {
        button.addEventListener("click", () => {
          const currentHouse = selectedHouse();
          const cost = createJuniorCost(currentHouse);
          if (currentHouse.juniorIds.length >= currentHouse.juniorSlots || state.population.available <= 0 || !spendResources(cost)) {
            renderHouses();
            return;
          }

          state.population.available -= 1;
          const juniorId = `${currentHouse.id}-junior-${Date.now()}`;
          const nextNumber = currentHouse.juniorIds.length + 1;
          state.juniorVampires[juniorId] = {
            id: juniorId,
            portrait: definition.emblem,
            name: `Обращенный ${nextNumber}`,
            level: 1,
            currentTask: "IDLE",
            healthPercent: 100,
            houseId: currentHouse.id
          };
          currentHouse.juniorIds.push(juniorId);
          grantHouseExperience(currentHouse, 35);
          renderHouses();
        });
      });

      workPanel.querySelectorAll("[data-remove-junior]").forEach((button) => {
        button.addEventListener("click", () => {
          const juniorId = button.dataset.removeJunior;
          const currentHouse = selectedHouse();
          currentHouse.juniorIds = currentHouse.juniorIds.filter((id) => id !== juniorId);
          delete state.juniorVampires[juniorId];
          renderHouses();
        });
      });

      workPanel.querySelectorAll("[data-junior-task]").forEach((select) => {
        select.addEventListener("change", () => {
          const junior = state.juniorVampires[select.dataset.juniorTask];
          if (!junior) {
            return;
          }

          junior.currentTask = select.value;
          renderHouses();
        });
      });
    }

    function renderPlaceholder() {
      workPanel.innerHTML = `
        <div class="work-head">
          <h2 class="work-title">${viewTitles[activeView]}</h2>
          <span class="work-meta">NecroTown</span>
        </div>
        <div class="placeholder">${viewTitles[activeView]}</div>
      `;
    }

    function renderWork() {
      if (activeView === "city" || activeView === "buildings") {
        renderCity();
      } else if (activeView === "map") {
        renderMap();
      } else if (activeView === "houses") {
        renderHouses();
      } else {
        renderPlaceholder();
      }
    }

    function renderGame() {
      renderResources();
      renderHero();
      renderWork();
    }

    async function loadChat() {
      if (!state) {
        return;
      }

      try {
        const data = await api("/api/chat.php");
        chatLog.innerHTML = data.messages.map((message) => `
          <div class="chat-message">
            <strong>${escapeHtml(message.username)}</strong>: ${escapeHtml(message.message)}
          </div>
        `).join("");
        chatLog.scrollTop = chatLog.scrollHeight;
      } catch (error) {
        chatLog.innerHTML = `<div class="chat-message">${error.message}</div>`;
      }
    }

    function showGame(nextState) {
      state = nextState;
      document.body.classList.add("is-game");
      gameShell.setAttribute("aria-hidden", "false");
      authShell.setAttribute("aria-hidden", "true");
      renderGame();
      loadChat();
      clearInterval(chatTimer);
      chatTimer = setInterval(loadChat, 5000);
    }

    enterGame.addEventListener("click", showAuth);
    enterGame.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        showAuth();
      }
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => selectAuthTab(tab.dataset.tab));
    });

    authForms.login.addEventListener("submit", async (event) => {
      event.preventDefault();
      setAuthMessage("Входим...");

      try {
        const data = await api("/api/auth.php?action=login", {
          method: "POST",
          body: JSON.stringify(formData(authForms.login))
        });
        showGame(data.state);
      } catch (error) {
        setAuthMessage(error.message);
      }
    });

    authForms.register.addEventListener("submit", async (event) => {
      event.preventDefault();
      setAuthMessage("Создаём героя...");

      try {
        const data = await api("/api/auth.php?action=register", {
          method: "POST",
          body: JSON.stringify(formData(authForms.register))
        });
        showGame(data.state);
      } catch (error) {
        setAuthMessage(error.message);
      }
    });

    menuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeView = button.dataset.view;
        menuButtons.forEach((item) => item.classList.toggle("is-active", item === button));
        renderWork();
      });
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const input = chatForm.elements.message;
      const message = input.value.trim();
      if (!message) {
        return;
      }

      input.value = "";
      await api("/api/chat.php", {
        method: "POST",
        body: JSON.stringify({ message })
      });
      await loadChat();
    });

    logoutButton.addEventListener("click", async () => {
      await api("/api/auth.php?action=logout", { method: "POST", body: "{}" });
      clearInterval(chatTimer);
      window.location.reload();
    });

    api("/api/auth.php?action=me")
      .then((data) => {
        if (data.authenticated) {
          showGame(data.state);
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
