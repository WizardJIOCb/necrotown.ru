<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NecroTown</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #090909;
      --bg-2: #1b0f12;
      --accent: #d24b43;
      --text: #f5efe8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(210, 75, 67, 0.22), transparent 35%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }
    h1 {
      margin: 0;
      padding: 24px;
      text-align: center;
      font-size: clamp(56px, 12vw, 144px);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(210, 75, 67, 0.35);
    }
  </style>
</head>
<body>
  <h1>NecroTown!!!</h1>
</body>
</html>
