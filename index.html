<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NecroTown</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #090909;
      --bg-2: #1b0f12;
      --panel: rgba(18, 14, 15, 0.84);
      --panel-border: rgba(245, 239, 232, 0.14);
      --accent: #d24b43;
      --accent-2: #e8b15f;
      --text: #f5efe8;
      --muted: #b9aaa1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(232, 177, 95, 0.12), transparent 26%),
        radial-gradient(circle at top, rgba(210, 75, 67, 0.22), transparent 35%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .intro {
      display: grid;
      place-items: center;
      width: min(100%, 1200px);
      padding: 24px;
      transition:
        opacity 620ms ease,
        transform 780ms cubic-bezier(.2, .8, .2, 1),
        filter 620ms ease;
    }

    .intro.is-hidden {
      opacity: 0;
      transform: translateY(-42px) scale(0.94);
      filter: blur(12px);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      padding: 24px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      text-align: center;
      font-size: clamp(56px, 12vw, 144px);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(210, 75, 67, 0.35);
      transition:
        color 220ms ease,
        transform 220ms ease,
        text-shadow 220ms ease;
    }

    h1:hover,
    h1:focus-visible {
      color: #fff8ef;
      outline: 0;
      transform: translateY(-4px);
      text-shadow:
        0 0 34px rgba(210, 75, 67, 0.55),
        0 0 70px rgba(232, 177, 95, 0.18);
    }

    .auth-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(22px) scale(0.98);
      transition:
        opacity 520ms ease 220ms,
        visibility 0s linear 760ms,
        transform 620ms cubic-bezier(.2, .8, .2, 1) 220ms;
    }

    .auth-shell.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition-delay: 180ms, 0s, 180ms;
    }

    .auth-panel {
      width: min(100%, 430px);
      padding: 24px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), transparent 42%),
        var(--panel);
      box-shadow:
        0 26px 70px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
    }

    .auth-title {
      margin: 0 0 18px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
      padding: 4px;
      border: 1px solid rgba(245, 239, 232, 0.11);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .tab {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: 700 13px/1.1 Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 180ms ease, color 180ms ease;
    }

    .tab.is-active {
      background: rgba(210, 75, 67, 0.24);
      color: var(--text);
    }

    .auth-form {
      display: none;
      gap: 12px;
    }

    .auth-form.is-active {
      display: grid;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font: 700 12px/1.2 Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(245, 239, 232, 0.15);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font: 16px/1.2 Arial, sans-serif;
      padding: 12px 13px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    input:focus {
      border-color: rgba(232, 177, 95, 0.74);
      box-shadow: 0 0 0 3px rgba(232, 177, 95, 0.12);
    }

    .submit {
      min-height: 48px;
      margin-top: 4px;
      border: 0;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), #9d2d35);
      color: #fffaf4;
      cursor: pointer;
      font: 800 14px/1.1 Arial, sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 12px 28px rgba(210, 75, 67, 0.25);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .submit:hover,
    .submit:focus-visible {
      outline: 0;
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    @media (max-width: 520px) {
      .intro {
        padding: 12px;
      }

      h1 {
        padding: 12px;
        font-size: clamp(44px, 18vw, 76px);
        letter-spacing: 0.04em;
      }

      .auth-panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="intro" id="intro">
    <h1 id="enterGame" role="button" tabindex="0" aria-label="Открыть вход в NecroTown">NecroTown</h1>
  </main>

  <section class="auth-shell" id="authShell" aria-hidden="true">
    <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <h2 class="auth-title" id="authTitle">NecroTown</h2>

      <div class="tabs" role="tablist" aria-label="Режим авторизации">
        <button class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="loginForm" data-tab="login">Вход</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="registerForm" data-tab="register">Регистрация</button>
      </div>

      <form class="auth-form is-active" id="loginForm">
        <label>
          Логин
          <input name="login" autocomplete="username" required />
        </label>
        <label>
          Пароль
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="submit" type="submit">Войти в игру</button>
      </form>

      <form class="auth-form" id="registerForm">
        <label>
          Логин
          <input name="login" autocomplete="username" required />
        </label>
        <label>
          Email
          <input name="email" type="email" autocomplete="email" required />
        </label>
        <label>
          Пароль
          <input name="password" type="password" autocomplete="new-password" required />
        </label>
        <button class="submit" type="submit">Создать героя</button>
      </form>
    </div>
  </section>

  <script>
    const intro = document.getElementById("intro");
    const enterGame = document.getElementById("enterGame");
    const authShell = document.getElementById("authShell");
    const tabs = document.querySelectorAll(".tab");
    const forms = {
      login: document.getElementById("loginForm"),
      register: document.getElementById("registerForm")
    };

    function showAuth() {
      intro.classList.add("is-hidden");
      authShell.classList.add("is-visible");
      authShell.setAttribute("aria-hidden", "false");
      window.setTimeout(() => forms.login.querySelector("input").focus(), 520);
    }

    enterGame.addEventListener("click", showAuth);
    enterGame.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        showAuth();
      }
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const mode = tab.dataset.tab;

        tabs.forEach((item) => {
          const isActive = item === tab;
          item.classList.toggle("is-active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });

        Object.entries(forms).forEach(([name, form]) => {
          form.classList.toggle("is-active", name === mode);
        });

        forms[mode].querySelector("input").focus();
      });
    });

    Object.values(forms).forEach((form) => {
      form.addEventListener("submit", (event) => {
        event.preventDefault();
      });
    });
  </script>
</body>
</html>
